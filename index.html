<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Poll App</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons (Replaces Lucide for standalone HTML) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen text-slate-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo } = React;

    // --- Firebase Initialization ---
    const firebaseConfig = {
      apiKey: "AIzaSyAJT4ocBtIHg1nY2Pk6Roj6uYFF9SQs0R4",
      authDomain: "livepoll-2e695.firebaseapp.com",
      projectId: "livepoll-2e695",
      storageBucket: "livepoll-2e695.firebasestorage.app",
      messagingSenderId: "1076833534559",
      appId: "1:1076833534559:web:a663582c95fa36ae24d1ea"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const runtimeAppId = 'live-poll-app-github';

    const CHART_COLORS = ['#FF2A54', '#00C3A9', '#FFC100', '#5D5FEF', '#FF7A00', '#00D1FF'];

    const POLL_TYPES = [
      { id: 'multiple_choice', label: 'Multiple Choice', icon: 'ph-chart-bar', color: 'text-blue-500' },
      { id: 'word_cloud', label: 'Word Cloud', icon: 'ph-cloud', color: 'text-pink-500' },
      { id: 'open_ended', label: 'Open Ended', icon: 'ph-chat-circle-text', color: 'text-green-500' },
      { id: 'scales', label: 'Scales', icon: 'ph-sliders-horizontal', color: 'text-purple-500' },
      { id: 'ranking', label: 'Ranking', icon: 'ph-list-numbers', color: 'text-orange-500' },
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [polls, setPolls] = useState([]);
      const [votes, setVotes] = useState([]);
      const [view, setView] = useState('home'); 
      const [activePollCode, setActivePollCode] = useState(null);
      
      const [newQuestion, setNewQuestion] = useState('');
      const [newOptions, setNewOptions] = useState(['', '', '']);
      const [newPollType, setNewPollType] = useState('multiple_choice');
      const [allowMultiple, setAllowMultiple] = useState(false);
      
      const [joinCode, setJoinCode] = useState('');
      const [joinError, setJoinError] = useState('');

      const [textInput, setTextInput] = useState('');
      const [scaleValues, setScaleValues] = useState({});
      const [rankOrder, setRankOrder] = useState([]);
      const [wantsToVoteAgain, setWantsToVoteAgain] = useState(false);

      // Auth states
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [authError, setAuthError] = useState('');

      useEffect(() => {
        let mounted = true;

        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.warn("Firebase Auth Note:", err.message);
            if (mounted) {
              setUser({ 
                uid: 'local-' + Math.random().toString(36).substring(2, 11),
                isMockUser: true 
              });
            }
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (mounted && currentUser) {
            setUser(currentUser);
          }
        });

        return () => {
          mounted = false;
          unsubscribe();
        };
      }, []);

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '') || 'home';
          const [newView, code] = hash.split('/');
          setView(newView);
          if (code) {
            setActivePollCode(code);
            setWantsToVoteAgain(false);
          } else {
            setActivePollCode(null);
          }
        };
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      useEffect(() => {
        if (!user) return;

        const pollsRef = collection(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_polls');
        const votesRef = collection(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_votes');

        const unsubscribePolls = onSnapshot(pollsRef, (snapshot) => {
          const fetchedPolls = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setPolls(fetchedPolls);
        }, (error) => console.warn("Note: Could not fetch polls:", error.message));

        const unsubscribeVotes = onSnapshot(votesRef, (snapshot) => {
          const fetchedVotes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setVotes(fetchedVotes);
        }, (error) => console.warn("Note: Could not fetch votes:", error.message));

        return () => {
          unsubscribePolls();
          unsubscribeVotes();
        };
      }, [user]);

      const activePoll = useMemo(() => {
        if (!activePollCode) return null;
        return polls.find(p => p.code === activePollCode);
      }, [polls, activePollCode]);

      const activePollVotes = useMemo(() => {
        if (!activePoll) return [];
        return votes.filter(v => v.pollCode === activePoll.code);
      }, [votes, activePoll]);

      const hasUserVoted = useMemo(() => {
        if (!user || !activePoll) return false;
        return activePollVotes.some(v => v.userId === user.uid);
      }, [user, activePoll, activePollVotes]);

      const voteCounts = useMemo(() => {
        if (!activePoll) return [];
        const counts = new Array(activePoll.options?.length || 0).fill(0);
        activePollVotes.forEach(vote => {
          if (vote.optionIndex >= 0 && vote.optionIndex < counts.length) {
            counts[vote.optionIndex]++;
          }
        });
        return counts;
      }, [activePoll, activePollVotes]);

      const handleCreatePoll = async () => {
        if (!user || !newQuestion.trim()) {
          alert("Please enter a question.");
          return;
        }
        
        const requiresOptions = ['multiple_choice', 'scales', 'ranking'].includes(newPollType);
        if (requiresOptions && newOptions.filter(o => o.trim()).length < 2) {
          alert("Please enter at least two options for this poll type.");
          return;
        }

        let code;
        do {
          code = Math.floor(1000 + Math.random() * 9000).toString();
        } while (polls.some(p => p.code === code));

        const pollData = {
          code,
          type: newPollType,
          question: newQuestion.trim(),
          options: requiresOptions ? newOptions.map(o => o.trim()).filter(o => o) : [],
          allowMultipleResponses: allowMultiple,
          hostId: user.uid,
          createdAt: serverTimestamp(),
          isActive: true
        };

        try {
          const pollRef = doc(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_polls', code);
          await setDoc(pollRef, pollData);
          setNewQuestion('');
          setNewOptions(['', '', '']);
          setNewPollType('multiple_choice');
          setAllowMultiple(false);
          window.location.hash = `#host/${code}`;
        } catch (err) {
          console.warn("Error creating poll:", err.message);
          alert("Failed to create poll. Make sure your Firestore rules are in Test Mode.");
        }
      };

      const handleJoinPoll = (e) => {
        e.preventDefault();
        const targetPoll = polls.find(p => p.code === joinCode && p.isActive);
        if (targetPoll) {
          setJoinError('');
          window.location.hash = `#participant/${joinCode}`;
        } else {
          setJoinError('Invalid or inactive poll code. Please try again.');
        }
      };

      const handleVote = async (payload) => {
        if (!user || !activePoll) return;
        if (hasUserVoted && !activePoll.allowMultipleResponses) return;

        const voteId = activePoll.allowMultipleResponses 
          ? `${activePoll.code}_${user.uid}_${Date.now()}`
          : `${activePoll.code}_${user.uid}`;
          
        const voteData = {
          pollCode: activePoll.code,
          userId: user.uid,
          timestamp: serverTimestamp(),
          ...payload
        };

        try {
          const voteRef = doc(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_votes', voteId);
          await setDoc(voteRef, voteData);
          setWantsToVoteAgain(false);
          setTextInput('');
          setScaleValues({});
          setRankOrder([]);
        } catch (err) {
          console.warn("Error casting vote:", err.message);
        }
      };

      const getWordCloudData = () => {
        const words = {};
        activePollVotes.forEach(v => {
          if (!v.text) return;
          const tokens = v.text.toLowerCase().split(/[\s,.'!?]+/);
          tokens.forEach(t => {
            if (t.length > 2) words[t] = (words[t] || 0) + 1;
          });
        });
        return Object.entries(words).sort((a,b) => b[1] - a[1]).slice(0, 40);
      };

      const getScalesData = () => {
        const totals = new Array(activePoll?.options?.length || 0).fill(0);
        const counts = new Array(activePoll?.options?.length || 0).fill(0);
        activePollVotes.forEach(v => {
          if (v.scaleValues) {
            activePoll.options.forEach((_, idx) => {
               if (v.scaleValues[idx] !== undefined) {
                 totals[idx] += Number(v.scaleValues[idx]);
                 counts[idx]++;
               }
            });
          }
        });
        return activePoll?.options?.map((opt, idx) => ({
          option: opt,
          average: counts[idx] > 0 ? (totals[idx] / counts[idx]).toFixed(1) : 0
        })) || [];
      };

      const getRankingData = () => {
        const points = new Array(activePoll?.options?.length || 0).fill(0);
        const n = activePoll?.options?.length || 0;
        activePollVotes.forEach(v => {
          if (v.rankOrder && Array.isArray(v.rankOrder)) {
            v.rankOrder.forEach((optIdx, rankIdx) => {
              points[optIdx] += (n - rankIdx);
            });
          }
        });
        return activePoll?.options?.map((opt, idx) => ({
          option: opt,
          points: points[idx]
        })).sort((a,b) => b.points - a.points) || [];
      };

      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        setAuthError('');
        
        try {
          // Format username to use as a dummy email for Firebase Auth
          const cleanUsername = username.trim().replace(/[^a-zA-Z0-9_]/g, '').toLowerCase();
          
          if (!cleanUsername) {
            throw new Error("Username must contain alphanumeric characters.");
          }
          
          const dummyEmail = `${cleanUsername}@livepoll.app`;

          if (isSignUp) {
            const userCredential = await createUserWithEmailAndPassword(auth, dummyEmail, password);
            // Save the real username in their display profile
            await updateProfile(userCredential.user, { displayName: username.trim() });
          } else {
            await signInWithEmailAndPassword(auth, dummyEmail, password);
          }
          
          window.location.hash = '#home';
          setUsername('');
          setPassword('');
        } catch (error) {
          // Mask Firebase's "email" errors to say "username" instead
          let msg = error.message;
          if (msg.includes('email')) {
             msg = msg.replace(/email/g, 'username').replace(/Email/g, 'Username');
          }
          if (msg.includes('auth/invalid-credential')) {
             msg = "Invalid username or password.";
          }
          setAuthError(msg);
        }
      };

      const renderAuth = () => (
        <div className="flex-1 flex flex-col items-center justify-center p-6 h-screen">
          <div className="w-full max-w-sm">
            <div className="flex justify-center mb-8">
              <i className="ph-fill ph-user-circle text-transparent bg-clip-text bg-gradient-to-br from-indigo-500 to-purple-500 text-6xl"></i>
            </div>
            <form onSubmit={handleAuthSubmit} className="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
              <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-500 text-center mb-6">
                {isSignUp ? 'Create Account' : 'Creator Login'}
              </h2>
              
              {authError && <p className="text-red-600 text-sm font-medium text-center mb-4 bg-red-50 p-3 rounded-xl border border-red-100">{authError}</p>}
              
              <input 
                type="text" 
                value={username}
                onChange={(e) => setUsername(e.target.value)}
                className="w-full px-4 py-3 text-slate-900 font-medium rounded-xl border-2 border-slate-200 focus:border-indigo-500 focus:ring-0 outline-none mb-4 transition-colors"
                placeholder="Username"
                required
              />
              
              <input 
                type="password" 
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                className="w-full px-4 py-3 text-slate-900 font-medium rounded-xl border-2 border-slate-200 focus:border-indigo-500 focus:ring-0 outline-none mb-6 transition-colors"
                placeholder="Password"
                required
              />

              <button 
                type="submit"
                className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-3.5 rounded-xl font-bold text-lg transition-all shadow-md transform hover:scale-[1.02]"
              >
                {isSignUp ? 'Sign Up' : 'Log In'}
              </button>

              <div className="mt-6 text-center">
                <button 
                  type="button"
                  onClick={() => setIsSignUp(!isSignUp)}
                  className="text-sm font-bold text-indigo-600 hover:text-pink-600 transition-colors"
                >
                  {isSignUp ? 'Already have an account? Log in' : "Don't have an account? Sign up"}
                </button>
              </div>

              <button 
                type="button"
                onClick={() => { window.location.hash = '#home'; }}
                className="w-full mt-6 text-slate-500 font-bold hover:text-slate-900 transition-colors"
              >
                Cancel
              </button>
            </form>
          </div>
        </div>
      );

      const renderHome = () => (
        <div className="flex flex-col items-center justify-center flex-1 p-6 relative">
          <div className="absolute top-4 right-4 flex gap-4">
            {user && !user.isAnonymous && !user.isMockUser ? (
              <div className="flex items-center gap-4 bg-white/80 backdrop-blur-sm px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                <span className="text-slate-800 font-bold text-sm">Hi, {user.displayName || 'Creator'}</span>
                <button onClick={() => signOut(auth).then(() => window.location.reload())} className="text-sm font-bold text-red-500 hover:text-red-700 transition-colors">Sign Out</button>
              </div>
            ) : (
              <button onClick={() => { window.location.hash = '#auth'; }} className="flex items-center gap-2 bg-white/80 backdrop-blur-sm border border-slate-200 shadow-sm px-4 py-2 rounded-xl text-sm font-bold text-slate-800 hover:bg-white transition-all">
                <i className="ph-bold ph-user text-indigo-600"></i>
                Creator Login
              </button>
            )}
          </div>
          <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden text-center p-10 transform transition-all hover:scale-[1.01]">
            <div className="bg-gradient-to-tr from-indigo-500 to-pink-500 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3">
              <i className="ph-bold ph-chart-bar text-white text-4xl -rotate-3"></i>
            </div>
            <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-500 mb-3">Live Polls</h1>
            <p className="text-slate-600 font-medium mb-10 text-lg">Engage your audience with real-time interactive presentations.</p>
            
            <div className="space-y-4">
              <button 
                onClick={() => { window.location.hash = '#join'; }}
                className="w-full flex items-center justify-center gap-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-md"
              >
                <i className="ph-bold ph-device-mobile text-2xl"></i>
                Join a Presentation
              </button>
              <button 
                onClick={() => { window.location.hash = '#create'; }}
                className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:border-indigo-500 hover:text-indigo-600 text-slate-800 py-4 rounded-xl font-bold text-lg transition-all"
              >
                <i className="ph-bold ph-presentation-chart text-2xl text-pink-500"></i>
                Create a New Poll
              </button>
            </div>
          </div>
        </div>
      );

      const renderCreate = () => (
        <div className="flex-1 flex flex-col items-center p-6">
          <div className="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-8 md:p-10 mt-8 border border-slate-100">
            <div className="flex items-center gap-3 mb-8">
              <button onClick={() => { window.location.hash = '#home'; }} className="text-slate-400 hover:text-indigo-600 transition-colors font-bold">
                ← Back
              </button>
              <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-500">Create New Poll</h2>
            </div>

            <div className="space-y-8">
              <div>
                <label className="block text-sm font-bold text-slate-800 mb-4 uppercase tracking-wider">Poll Type</label>
                <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                  {POLL_TYPES.map(type => {
                    const isSelected = newPollType === type.id;
                    return (
                      <button
                        key={type.id}
                        onClick={() => setNewPollType(type.id)}
                        className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all transform hover:-translate-y-1 ${
                          isSelected 
                            ? 'border-indigo-500 bg-indigo-50 shadow-md' 
                            : 'border-slate-100 hover:border-indigo-300 hover:bg-slate-50'
                        }`}
                      >
                        <i className={`ph-fill ${type.icon} text-3xl mb-2 ${isSelected ? type.color : 'text-slate-400'}`}></i>
                        <span className={`text-xs font-bold text-center leading-tight ${isSelected ? 'text-indigo-900' : 'text-slate-600'}`}>{type.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div>
                <label className="block text-sm font-bold text-slate-800 mb-3 uppercase tracking-wider">Your Question</label>
                <input 
                  type="text" 
                  value={newQuestion}
                  onChange={(e) => setNewQuestion(e.target.value)}
                  placeholder="What would you like to ask?"
                  className="w-full px-5 py-4 font-semibold text-slate-900 rounded-2xl border-2 border-slate-200 focus:ring-0 focus:border-indigo-500 outline-none text-xl transition-colors shadow-sm"
                />
              </div>

              {['multiple_choice', 'scales', 'ranking'].includes(newPollType) && (
                <div>
                  <label className="block text-sm font-bold text-slate-800 mb-3 uppercase tracking-wider">
                    {newPollType === 'scales' ? 'Statements to rate' : 'Options'}
                  </label>
                  <div className="space-y-4">
                    {newOptions.map((opt, idx) => (
                      <div key={idx} className="flex gap-3">
                        <input 
                          type="text" 
                          value={opt}
                          onChange={(e) => {
                            const updated = [...newOptions];
                            updated[idx] = e.target.value;
                            setNewOptions(updated);
                          }}
                          placeholder={`Option ${idx + 1}`}
                          className="flex-1 px-5 py-4 font-medium text-slate-900 rounded-2xl border-2 border-slate-200 focus:ring-0 focus:border-indigo-500 outline-none transition-colors shadow-sm"
                        />
                        {newOptions.length > 2 && (
                          <button 
                            onClick={() => setNewOptions(newOptions.filter((_, i) => i !== idx))}
                            className="p-4 text-red-500 bg-red-50 hover:bg-red-100 rounded-2xl transition-colors font-bold"
                          >
                            <i className="ph-bold ph-trash text-2xl"></i>
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                  <button 
                    onClick={() => setNewOptions([...newOptions, ''])}
                    className="mt-5 flex items-center gap-2 text-indigo-600 font-extrabold hover:text-pink-600 transition-colors bg-indigo-50 px-4 py-2 rounded-xl"
                  >
                    <i className="ph-bold ph-plus"></i> Add Another Option
                  </button>
                </div>
              )}

              <div className="flex items-center gap-3 mt-8 pt-8 border-t border-slate-100">
                <label className="flex items-center gap-4 cursor-pointer">
                  <input 
                    type="checkbox" 
                    checked={allowMultiple}
                    onChange={(e) => setAllowMultiple(e.target.checked)}
                    className="w-6 h-6 text-pink-500 rounded border-slate-300 focus:ring-pink-500 cursor-pointer"
                  />
                  <span className="text-base font-bold text-slate-800">Allow participants to submit multiple responses</span>
                </label>
              </div>

              <div className="pt-4">
                <button 
                  onClick={handleCreatePoll}
                  className="w-full bg-gradient-to-r from-indigo-600 to-pink-500 hover:from-indigo-700 hover:to-pink-600 text-white py-5 rounded-2xl font-extrabold text-xl shadow-lg transition-all transform hover:scale-[1.02] flex items-center justify-center gap-3"
                >
                  <i className="ph-fill ph-play text-2xl"></i>
                  Start Presentation
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      const renderHostView = () => {
        if (!activePoll) return <div className="p-10 text-center flex-1">Loading poll...</div>;

        const totalVotes = activePollVotes.length;
        const maxVotes = Math.max(...voteCounts, 1);

        const renderChartContent = () => {
          switch (activePoll.type) {
            case 'word_cloud': {
              const words = getWordCloudData();
              
              // Colors perfectly matching the uploaded image (pastel blues, pinks, tans)
              const CLOUD_COLORS = ['#B7C2EA', '#ECA9A6', '#D6BDBB', '#A6B2E0', '#E5B1AF', '#C3CADF'];
              
              const hashString = (str) => {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                return Math.abs(hash);
              };

              const maxCount = words.length > 0 ? Math.max(...words.map(w => w[1])) : 1;

              return (
                <div className="bg-white rounded-3xl shadow-2xl p-12 md:p-20 w-full max-w-5xl flex flex-wrap justify-center items-center content-center min-h-[400px] gap-x-6 gap-y-2">
                  {words.length === 0 && <div className="text-slate-400 text-2xl italic font-medium">Waiting for responses...</div>}
                  {words.map(([word, count], idx) => {
                    const relativeSize = maxCount > 0 ? count / maxCount : 1;
                    const size = 1.5 + (relativeSize * 5.5); 
                    
                    const hash = hashString(word);
                    const color = CLOUD_COLORS[hash % CLOUD_COLORS.length];
                    const fontWeight = size >= 5 ? '700' : (size >= 3.5 ? '600' : '500');
                    
                    return (
                      <span 
                        key={idx} 
                        style={{ 
                          fontSize: `${size}rem`, 
                          color: color, 
                          fontWeight: fontWeight, 
                          lineHeight: '0.85',
                        }} 
                        className="transition-all duration-700 ease-in-out font-sans tracking-tight text-center hover:scale-105 cursor-default"
                      >
                        {word}
                      </span>
                    );
                  })}
                </div>
              );
            }
            case 'open_ended':
              return (
                <div className="w-full max-w-5xl columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
                  {activePollVotes.length === 0 && <div className="text-slate-400 text-2xl italic font-medium w-full text-center">Waiting for responses...</div>}
                  {activePollVotes.map((vote, idx) => (
                    <div key={idx} className="bg-slate-800/80 backdrop-blur-sm p-8 rounded-3xl shadow-xl border border-slate-700 break-inside-avoid">
                      <p className="text-2xl font-medium leading-relaxed text-white">"{vote.text}"</p>
                    </div>
                  ))}
                </div>
              );
            case 'scales': {
              const scalesData = getScalesData();
              return (
                <div className="w-full max-w-4xl space-y-8 bg-slate-900/50 p-10 rounded-3xl border border-slate-700">
                  {scalesData.map((item, idx) => (
                    <div key={idx} className="w-full">
                      <div className="flex justify-between items-end mb-3">
                        <span className="text-2xl font-bold text-slate-100">{item.option}</span>
                        <span className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-pink-400">{item.average}</span>
                      </div>
                      <div className="w-full h-8 bg-slate-800 rounded-full overflow-hidden shadow-inner">
                        <div 
                          className="h-full bg-gradient-to-r from-indigo-500 to-pink-500 transition-all duration-1000 ease-out"
                          style={{ width: `${(item.average / 5) * 100}%` }}
                        />
                      </div>
                      <div className="flex justify-between text-slate-400 text-sm mt-3 px-1 font-bold tracking-wider uppercase">
                        <span>Strongly Disagree (1)</span>
                        <span>Strongly Agree (5)</span>
                      </div>
                    </div>
                  ))}
                </div>
              );
            }
            case 'ranking': {
              const rankedData = getRankingData();
              return (
                <div className="w-full max-w-3xl space-y-4">
                  {rankedData.map((item, idx) => (
                    <div key={idx} className="flex items-center bg-slate-800/90 backdrop-blur-sm rounded-2xl p-6 shadow-xl border border-slate-700 transform transition-all duration-500" style={{ transform: `translateY(${idx * 4}px)` }}>
                      <div className="w-14 h-14 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center font-extrabold text-3xl mr-6 shrink-0 shadow-lg text-white">
                        {idx + 1}
                      </div>
                      <div className="flex-1 text-3xl font-bold text-white tracking-tight">
                        {item.option}
                      </div>
                      <div className="text-pink-400 font-extrabold text-2xl">
                        {item.points} pts
                      </div>
                    </div>
                  ))}
                </div>
              );
            }
            case 'multiple_choice':
            default:
              return (
                <div className="w-full flex items-end justify-center gap-4 md:gap-8 h-[450px]">
                  {activePoll.options?.map((option, idx) => {
                    const count = voteCounts[idx];
                    const percentage = totalVotes === 0 ? 0 : Math.round((count / totalVotes) * 100);
                    const heightPercent = (count / maxVotes) * 100;
                    const color = CHART_COLORS[idx % CHART_COLORS.length];

                    return (
                      <div key={idx} className="flex flex-col items-center justify-end h-full w-24 md:w-36 group">
                        <div className="text-3xl font-extrabold mb-3 opacity-0 group-hover:opacity-100 transition-opacity text-white">
                          {count}
                        </div>
                        <div 
                          className="w-full rounded-t-xl relative transition-all duration-1000 ease-bounce shadow-[0_0_20px_rgba(0,0,0,0.3)]"
                          style={{ 
                            height: `${heightPercent}%`, 
                            minHeight: '8px',
                            backgroundColor: color 
                          }}
                        >
                           <div className="absolute -top-10 left-0 right-0 text-center font-bold text-xl hidden md:block text-slate-300">
                             {percentage > 0 ? `${percentage}%` : ''}
                           </div>
                        </div>
                        <div className="mt-6 text-center font-bold text-lg md:text-2xl break-words w-full px-2 leading-tight h-20 flex items-start justify-center text-white">
                          {option}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
          }
        };

        return (
          <div className="flex-1 bg-gradient-to-b from-slate-900 via-indigo-950 to-slate-900 flex flex-col font-sans text-white h-screen">
            <div className="bg-slate-900/50 backdrop-blur-md py-4 px-8 flex justify-between items-center border-b border-slate-800">
              <div className="text-xl font-medium">
                Go to <span className="font-bold text-slate-900 bg-white px-3 py-1.5 rounded-lg tracking-wider mx-2 shadow-[0_0_10px_rgba(255,255,255,0.3)]">this URL</span> and use code <span className="font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 text-4xl ml-2">{activePoll.code}</span>
              </div>
              <div className="flex items-center gap-6">
                <div className="flex items-center gap-3 text-slate-200 bg-slate-800/80 px-4 py-2 rounded-xl">
                  <i className="ph-fill ph-users text-2xl text-pink-500"></i>
                  <span className="font-extrabold text-2xl">{totalVotes}</span>
                </div>
                <button 
                  onClick={() => { window.location.hash = '#home'; }}
                  className="text-sm font-bold text-slate-400 hover:text-white transition-colors uppercase tracking-wider"
                >
                  Exit
                </button>
              </div>
            </div>

            <div className="flex-1 flex flex-col items-center justify-center p-12 max-w-7xl mx-auto w-full">
              <h1 className="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 via-purple-300 to-pink-300 text-center mb-20 leading-tight">
                {activePoll.question}
              </h1>
              {renderChartContent()}
            </div>
          </div>
        );
      };

      const renderJoin = () => (
        <div className="flex-1 bg-gradient-to-br from-indigo-600 to-purple-700 flex flex-col items-center justify-center p-6 h-screen">
          <div className="w-full max-w-sm transform transition-all hover:scale-[1.01]">
            <div className="flex justify-center mb-8">
              <i className="ph-bold ph-chart-bar text-white text-6xl drop-shadow-lg"></i>
            </div>
            <form onSubmit={handleJoinPoll} className="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
              <h2 className="text-3xl font-extrabold text-slate-800 text-center mb-8">Enter Join Code</h2>
              
              <input 
                type="text" 
                maxLength={4}
                value={joinCode}
                onChange={(e) => setJoinCode(e.target.value.replace(/\D/g, ''))}
                className="w-full text-center text-5xl font-extrabold text-indigo-600 tracking-[0.2em] px-4 py-6 rounded-2xl border-2 border-slate-200 focus:border-indigo-600 focus:ring-0 outline-none mb-6 shadow-inner transition-colors"
                placeholder="1234"
              />
              
              {joinError && <p className="text-red-500 text-sm font-bold text-center mb-6">{joinError}</p>}

              <button 
                type="submit"
                disabled={joinCode.length < 4}
                className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 disabled:from-slate-300 disabled:to-slate-300 text-white py-4 rounded-xl font-bold text-xl transition-all shadow-lg"
              >
                Submit
              </button>

              <button 
                type="button"
                onClick={() => { window.location.hash = '#home'; }}
                className="w-full mt-6 text-slate-500 font-bold hover:text-slate-800 transition-colors"
              >
                Cancel
              </button>
            </form>
          </div>
        </div>
      );

      const renderParticipantView = () => {
        if (!activePoll) {
           return (
             <div className="flex-1 flex items-center justify-center p-6 text-center">
               <div>
                 <div className="w-20 h-20 border-8 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mx-auto mb-6 shadow-lg"></div>
                 <p className="text-indigo-900 font-bold text-xl">Waiting for host...</p>
               </div>
             </div>
           );
        }

        if (hasUserVoted && !wantsToVoteAgain) {
          return (
            <div className="flex-1 flex flex-col items-center justify-center p-6 text-center h-screen">
              <i className="ph-fill ph-check-circle text-transparent bg-clip-text bg-gradient-to-br from-green-400 to-emerald-600 text-[100px] mb-8 drop-shadow-md"></i>
              <h2 className="text-4xl font-extrabold text-slate-800 mb-4">Submitted!</h2>
              <p className="text-slate-600 font-medium text-xl mb-10">Look at the presentation screen for live results.</p>
              
              {activePoll.allowMultipleResponses && (
                <button 
                  onClick={() => setWantsToVoteAgain(true)}
                  className="mb-8 bg-gradient-to-r from-indigo-600 to-pink-500 text-white px-10 py-5 rounded-2xl font-extrabold text-xl shadow-xl hover:scale-105 transition-transform"
                >
                  Submit Another Response
                </button>
              )}

              <button 
                onClick={() => { window.location.hash = '#home'; }}
                className="text-indigo-600 font-extrabold text-lg hover:text-pink-600 transition-colors"
              >
                Leave Presentation
              </button>
            </div>
          );
        }

        const toggleRank = (idx) => {
          if (rankOrder.includes(idx)) {
            setRankOrder(rankOrder.filter(i => i !== idx));
          } else {
            setRankOrder([...rankOrder, idx]);
          }
        };

        const renderInputForm = () => {
          switch(activePoll.type) {
            case 'word_cloud':
              return (
                <div className="space-y-6">
                  <input 
                    type="text" 
                    value={textInput}
                    onChange={(e) => setTextInput(e.target.value)}
                    placeholder="Enter a word or short phrase..."
                    className="w-full p-5 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 focus:ring-0 outline-none text-xl font-bold text-slate-900 shadow-sm transition-colors"
                    maxLength={50}
                  />
                  <button 
                    onClick={() => handleVote({ text: textInput.trim() })}
                    disabled={!textInput.trim()}
                    className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 disabled:from-slate-300 disabled:to-slate-300 text-white p-5 rounded-2xl font-extrabold text-xl shadow-lg transition-all"
                  >
                    Submit Word
                  </button>
                </div>
              );
            case 'open_ended':
              return (
                <div className="space-y-6">
                  <textarea 
                    value={textInput}
                    onChange={(e) => setTextInput(e.target.value)}
                    placeholder="Type your response here..."
                    className="w-full p-5 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 focus:ring-0 outline-none text-xl font-medium text-slate-900 h-40 resize-none shadow-sm transition-colors"
                    maxLength={500}
                  />
                  <button 
                    onClick={() => handleVote({ text: textInput.trim() })}
                    disabled={!textInput.trim()}
                    className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 disabled:from-slate-300 disabled:to-slate-300 text-white p-5 rounded-2xl font-extrabold text-xl shadow-lg transition-all"
                  >
                    Submit Response
                  </button>
                </div>
              );
            case 'scales':
              return (
                <div className="space-y-8">
                  {activePoll.options.map((option, idx) => (
                    <div key={idx} className="bg-white p-6 rounded-2xl border border-slate-100 shadow-md">
                      <label className="block font-extrabold text-slate-800 mb-6 text-xl">{option}</label>
                      <input 
                        type="range" 
                        min="1" max="5" step="1"
                        value={scaleValues[idx] || 3}
                        onChange={(e) => setScaleValues({ ...scaleValues, [idx]: Number(e.target.value) })}
                        className="w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-pink-500"
                      />
                      <div className="flex justify-between text-slate-500 text-sm mt-4 font-bold uppercase tracking-wider">
                        <span>1 (Strongly Disagree)</span>
                        <span className="text-pink-600 font-extrabold text-2xl -mt-1">{scaleValues[idx] || 3}</span>
                        <span>5 (Strongly Agree)</span>
                      </div>
                    </div>
                  ))}
                  <button 
                    onClick={() => handleVote({ scaleValues: { ...Object.fromEntries(activePoll.options.map((_, i) => [i, scaleValues[i] || 3])) } })}
                    className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white p-5 rounded-2xl font-extrabold text-xl shadow-lg transition-all mt-4"
                  >
                    Submit Ratings
                  </button>
                </div>
              );
            case 'ranking':
              return (
                <div className="space-y-6">
                  <p className="text-slate-600 text-base font-bold text-center">Tap the options in order of your preference</p>
                  <div className="space-y-4">
                    {activePoll.options.map((option, idx) => {
                      const rank = rankOrder.indexOf(idx);
                      const isSelected = rank !== -1;
                      return (
                        <button
                          key={idx}
                          onClick={() => toggleRank(idx)}
                          className={`w-full p-5 rounded-2xl text-left text-xl font-bold transition-all shadow-md flex items-center gap-5 border-2 ${
                            isSelected 
                              ? 'bg-indigo-50 border-indigo-500 text-indigo-900 scale-[1.02]' 
                              : 'bg-white hover:border-slate-300 border-slate-100 text-slate-700'
                          }`}
                        >
                          <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-extrabold text-xl shrink-0 transition-colors ${
                            isSelected ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-400'
                          }`}>
                            {isSelected ? rank + 1 : '-'}
                          </div>
                          {option}
                        </button>
                      );
                    })}
                  </div>
                  <button 
                    onClick={() => handleVote({ rankOrder })}
                    disabled={rankOrder.length !== activePoll.options.length}
                    className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 disabled:from-slate-300 disabled:to-slate-300 text-white p-5 rounded-2xl font-extrabold text-xl shadow-lg transition-all mt-4"
                  >
                    {rankOrder.length === activePoll.options.length ? 'Submit Ranking' : `Rank all options (${rankOrder.length}/${activePoll.options.length})`}
                  </button>
                </div>
              );
            case 'multiple_choice':
            default:
              return (
                <div className="space-y-4">
                  {activePoll.options.map((option, idx) => (
                    <button
                      key={idx}
                      onClick={() => handleVote({ optionIndex: idx })}
                      className="w-full bg-white hover:bg-indigo-50 hover:border-indigo-400 border-2 border-slate-100 p-6 rounded-2xl text-left text-xl font-bold text-slate-800 transition-all shadow-md flex items-center justify-between group transform hover:-translate-y-1"
                    >
                      {option}
                      <div className="w-8 h-8 rounded-full border-2 border-slate-300 group-hover:border-indigo-500 flex items-center justify-center bg-slate-50">
                        <div className="w-4 h-4 rounded-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                      </div>
                    </button>
                  ))}
                </div>
              );
          }
        };

        return (
          <div className="flex-1 flex flex-col items-center p-6 min-h-screen">
            <div className="w-full max-w-lg mt-8">
              <div className="bg-white rounded-3xl shadow-lg border border-slate-100 p-10 text-center mb-8">
                <div className="inline-block bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase mb-4">
                  {POLL_TYPES.find(t => t.id === activePoll.type)?.label || 'Question'}
                </div>
                <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-600 leading-tight">
                  {activePoll.question}
                </h2>
              </div>
              {renderInputForm()}
            </div>
          </div>
        );
      };

      let currentView;
      switch (view) {
        case 'auth': currentView = renderAuth(); break;
        case 'create': currentView = renderCreate(); break;
        case 'host': currentView = renderHostView(); break;
        case 'join': currentView = renderJoin(); break;
        case 'participant': currentView = renderParticipantView(); break;
        default: currentView = renderHome(); break;
      }

      return (
        <div className="min-h-screen flex flex-col font-sans">
          {user?.isMockUser && (
            <div className="bg-gradient-to-r from-amber-500 to-orange-500 text-white p-3 text-center text-sm font-bold z-50 shadow-md">
              ⚠️ <strong>Setup Required:</strong> To enable login and save polls, go to Firebase Console &rarr; Authentication &rarr; Sign-in method, and enable <strong>Email/Password Provider</strong> and <strong>Anonymous</strong>.
            </div>
          )}
          {currentView}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
