<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Poll App</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons (Replaces Lucide for standalone HTML) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const { useState, useEffect, useMemo } = React;

    // --- Firebase Initialization ---
    const firebaseConfig = {
      apiKey: "AIzaSyAJT4ocBtIHg1nY2Pk6Roj6uYFF9SQs0R4",
      authDomain: "livepoll-2e695.firebaseapp.com",
      projectId: "livepoll-2e695",
      storageBucket: "livepoll-2e695.firebasestorage.app",
      messagingSenderId: "1076833534559",
      appId: "1:1076833534559:web:a663582c95fa36ae24d1ea"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const runtimeAppId = 'live-poll-app-github';

    const CHART_COLORS = ['#FF2A54', '#00C3A9', '#FFC100', '#5D5FEF', '#FF7A00', '#00D1FF'];

    const POLL_TYPES = [
      { id: 'multiple_choice', label: 'Multiple Choice', icon: 'ph-chart-bar' },
      { id: 'word_cloud', label: 'Word Cloud', icon: 'ph-cloud' },
      { id: 'open_ended', label: 'Open Ended', icon: 'ph-chat-circle-text' },
      { id: 'scales', label: 'Scales', icon: 'ph-sliders-horizontal' },
      { id: 'ranking', label: 'Ranking', icon: 'ph-list-numbers' },
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [polls, setPolls] = useState([]);
      const [votes, setVotes] = useState([]);
      const [view, setView] = useState('home'); 
      const [activePollCode, setActivePollCode] = useState(null);
      
      const [newQuestion, setNewQuestion] = useState('');
      const [newOptions, setNewOptions] = useState(['', '', '']);
      const [newPollType, setNewPollType] = useState('multiple_choice');
      const [allowMultiple, setAllowMultiple] = useState(false);
      
      const [joinCode, setJoinCode] = useState('');
      const [joinError, setJoinError] = useState('');

      const [textInput, setTextInput] = useState('');
      const [scaleValues, setScaleValues] = useState({});
      const [rankOrder, setRankOrder] = useState([]);
      const [wantsToVoteAgain, setWantsToVoteAgain] = useState(false);

      useEffect(() => {
        let mounted = true;

        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.warn("Firebase Auth Note:", err.message);
            if (mounted) {
              setUser({ 
                uid: 'local-' + Math.random().toString(36).substring(2, 11),
                isMockUser: true 
              });
            }
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (mounted && currentUser) {
            setUser(currentUser);
          }
        });

        return () => {
          mounted = false;
          unsubscribe();
        };
      }, []);

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace('#', '') || 'home';
          const [newView, code] = hash.split('/');
          setView(newView);
          if (code) {
            setActivePollCode(code);
            setWantsToVoteAgain(false);
          } else {
            setActivePollCode(null);
          }
        };
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      useEffect(() => {
        if (!user) return;

        const pollsRef = collection(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_polls');
        const votesRef = collection(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_votes');

        const unsubscribePolls = onSnapshot(pollsRef, (snapshot) => {
          const fetchedPolls = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setPolls(fetchedPolls);
        }, (error) => console.warn("Note: Could not fetch polls:", error.message));

        const unsubscribeVotes = onSnapshot(votesRef, (snapshot) => {
          const fetchedVotes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setVotes(fetchedVotes);
        }, (error) => console.warn("Note: Could not fetch votes:", error.message));

        return () => {
          unsubscribePolls();
          unsubscribeVotes();
        };
      }, [user]);

      const activePoll = useMemo(() => {
        if (!activePollCode) return null;
        return polls.find(p => p.code === activePollCode);
      }, [polls, activePollCode]);

      const activePollVotes = useMemo(() => {
        if (!activePoll) return [];
        return votes.filter(v => v.pollCode === activePoll.code);
      }, [votes, activePoll]);

      const hasUserVoted = useMemo(() => {
        if (!user || !activePoll) return false;
        return activePollVotes.some(v => v.userId === user.uid);
      }, [user, activePoll, activePollVotes]);

      const voteCounts = useMemo(() => {
        if (!activePoll) return [];
        const counts = new Array(activePoll.options?.length || 0).fill(0);
        activePollVotes.forEach(vote => {
          if (vote.optionIndex >= 0 && vote.optionIndex < counts.length) {
            counts[vote.optionIndex]++;
          }
        });
        return counts;
      }, [activePoll, activePollVotes]);

      const handleCreatePoll = async () => {
        if (!user || !newQuestion.trim()) {
          alert("Please enter a question.");
          return;
        }
        
        const requiresOptions = ['multiple_choice', 'scales', 'ranking'].includes(newPollType);
        if (requiresOptions && newOptions.filter(o => o.trim()).length < 2) {
          alert("Please enter at least two options for this poll type.");
          return;
        }

        let code;
        do {
          code = Math.floor(1000 + Math.random() * 9000).toString();
        } while (polls.some(p => p.code === code));

        const pollData = {
          code,
          type: newPollType,
          question: newQuestion.trim(),
          options: requiresOptions ? newOptions.map(o => o.trim()).filter(o => o) : [],
          allowMultipleResponses: allowMultiple,
          hostId: user.uid,
          createdAt: serverTimestamp(),
          isActive: true
        };

        try {
          const pollRef = doc(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_polls', code);
          await setDoc(pollRef, pollData);
          setNewQuestion('');
          setNewOptions(['', '', '']);
          setNewPollType('multiple_choice');
          setAllowMultiple(false);
          window.location.hash = `#host/${code}`;
        } catch (err) {
          console.warn("Error creating poll:", err.message);
          alert("Failed to create poll. Make sure your Firestore rules are in Test Mode.");
        }
      };

      const handleJoinPoll = (e) => {
        e.preventDefault();
        const targetPoll = polls.find(p => p.code === joinCode && p.isActive);
        if (targetPoll) {
          setJoinError('');
          window.location.hash = `#participant/${joinCode}`;
        } else {
          setJoinError('Invalid or inactive poll code. Please try again.');
        }
      };

      const handleVote = async (payload) => {
        if (!user || !activePoll) return;
        if (hasUserVoted && !activePoll.allowMultipleResponses) return;

        const voteId = activePoll.allowMultipleResponses 
          ? `${activePoll.code}_${user.uid}_${Date.now()}`
          : `${activePoll.code}_${user.uid}`;
          
        const voteData = {
          pollCode: activePoll.code,
          userId: user.uid,
          timestamp: serverTimestamp(),
          ...payload
        };

        try {
          const voteRef = doc(db, 'artifacts', runtimeAppId, 'public', 'data', 'live_votes', voteId);
          await setDoc(voteRef, voteData);
          setWantsToVoteAgain(false);
          setTextInput('');
          setScaleValues({});
          setRankOrder([]);
        } catch (err) {
          console.warn("Error casting vote:", err.message);
        }
      };

      const getWordCloudData = () => {
        const words = {};
        activePollVotes.forEach(v => {
          if (!v.text) return;
          const tokens = v.text.toLowerCase().split(/[\s,.'!?]+/);
          tokens.forEach(t => {
            if (t.length > 2) words[t] = (words[t] || 0) + 1;
          });
        });
        return Object.entries(words).sort((a,b) => b[1] - a[1]).slice(0, 40);
      };

      const getScalesData = () => {
        const totals = new Array(activePoll?.options?.length || 0).fill(0);
        const counts = new Array(activePoll?.options?.length || 0).fill(0);
        activePollVotes.forEach(v => {
          if (v.scaleValues) {
            activePoll.options.forEach((_, idx) => {
               if (v.scaleValues[idx] !== undefined) {
                 totals[idx] += Number(v.scaleValues[idx]);
                 counts[idx]++;
               }
            });
          }
        });
        return activePoll?.options?.map((opt, idx) => ({
          option: opt,
          average: counts[idx] > 0 ? (totals[idx] / counts[idx]).toFixed(1) : 0
        })) || [];
      };

      const getRankingData = () => {
        const points = new Array(activePoll?.options?.length || 0).fill(0);
        const n = activePoll?.options?.length || 0;
        activePollVotes.forEach(v => {
          if (v.rankOrder && Array.isArray(v.rankOrder)) {
            v.rankOrder.forEach((optIdx, rankIdx) => {
              points[optIdx] += (n - rankIdx);
            });
          }
        });
        return activePoll?.options?.map((opt, idx) => ({
          option: opt,
          points: points[idx]
        })).sort((a,b) => b.points - a.points) || [];
      };

      const loginWithGoogle = async () => {
        const provider = new GoogleAuthProvider();
        try {
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error("Login failed", error);
        }
      };

      const renderHome = () => (
        <div className="flex flex-col items-center justify-center flex-1 p-6 relative">
          <div className="absolute top-4 right-4 flex gap-4">
            {user && !user.isAnonymous && !user.isMockUser ? (
              <div className="flex items-center gap-4 bg-white px-4 py-2 rounded-lg shadow-sm border border-slate-200">
                <span className="text-slate-600 font-medium text-sm">Hi, {user.displayName || 'Creator'}</span>
                <button onClick={() => signOut(auth).then(() => window.location.reload())} className="text-sm font-bold text-red-500 hover:text-red-700">Sign Out</button>
              </div>
            ) : (
              <button onClick={loginWithGoogle} className="flex items-center gap-2 bg-white border border-slate-200 shadow-sm px-4 py-2 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50 transition">
                <i className="ph-bold ph-google-logo text-blue-500"></i>
                Creator Login
              </button>
            )}
          </div>
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden text-center p-8">
            <div className="bg-indigo-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
              <i className="ph-bold ph-chart-bar text-white text-3xl"></i>
            </div>
            <h1 className="text-3xl font-bold text-slate-800 mb-2">Live Polls</h1>
            <p className="text-slate-500 mb-8">Engage your audience with real-time interactive presentations.</p>
            
            <div className="space-y-4">
              <button 
                onClick={() => { window.location.hash = '#join'; }}
                className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-semibold text-lg transition-colors"
              >
                <i className="ph-bold ph-device-mobile text-xl"></i>
                Join a Presentation
              </button>
              <button 
                onClick={() => { window.location.hash = '#create'; }}
                className="w-full flex items-center justify-center gap-2 bg-white border-2 border-slate-200 hover:border-indigo-600 hover:text-indigo-600 text-slate-700 py-4 rounded-xl font-semibold text-lg transition-colors"
              >
                <i className="ph-bold ph-presentation-chart text-xl"></i>
                Create a New Poll
              </button>
              {user && (!user.isAnonymous || polls.some(p => p.hostId === user.uid)) && (
                <button 
                  onClick={() => { window.location.hash = '#dashboard'; }}
                  className="w-full flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-semibold text-base transition-colors mt-2"
                >
                  <i className="ph-bold ph-folder-open text-lg"></i>
                  My Previous Polls
                </button>
              )}
            </div>
          </div>
        </div>
      );

      const renderDashboard = () => {
        const myPolls = polls.filter(p => p.hostId === user?.uid).sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
        
        return (
          <div className="flex-1 flex flex-col items-center p-6">
            <div className="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-8 mt-12">
              <div className="flex items-center gap-3 mb-8">
                <button onClick={() => { window.location.hash = '#home'; }} className="text-slate-400 hover:text-slate-600">
                  ← Back
                </button>
                <h2 className="text-2xl font-bold text-slate-800">My Polls</h2>
              </div>
              
              {myPolls.length === 0 ? (
                <p className="text-slate-500 text-center py-8">You haven't created any polls yet.</p>
              ) : (
                <div className="space-y-4">
                  {myPolls.map(poll => (
                    <div key={poll.id} className="flex items-center justify-between p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition">
                      <div>
                        <p className="font-bold text-slate-800">{poll.question}</p>
                        <p className="text-sm text-slate-500">Code: <span className="font-mono text-indigo-600">{poll.code}</span> • {POLL_TYPES.find(t => t.id === poll.type)?.label || poll.type}</p>
                      </div>
                      <button 
                        onClick={() => { window.location.hash = `#host/${poll.code}`; }}
                        className="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg font-semibold hover:bg-indigo-200 transition"
                      >
                        Open
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderCreate = () => (
        <div className="flex-1 flex flex-col items-center p-6">
          <div className="w-full max-w-2xl bg-white rounded-2xl shadow-lg p-8 mt-12">
            <div className="flex items-center gap-3 mb-8">
              <button onClick={() => { window.location.hash = '#home'; }} className="text-slate-400 hover:text-slate-600">
                ← Back
              </button>
              <h2 className="text-2xl font-bold text-slate-800">Create New Poll</h2>
            </div>

            <div className="space-y-6">
              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-3">Poll Type</label>
                <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                  {POLL_TYPES.map(type => {
                    const isSelected = newPollType === type.id;
                    return (
                      <button
                        key={type.id}
                        onClick={() => setNewPollType(type.id)}
                        className={`flex flex-col items-center justify-center p-3 rounded-xl border-2 transition-all ${
                          isSelected 
                            ? 'border-indigo-600 bg-indigo-50 text-indigo-700' 
                            : 'border-slate-200 hover:border-indigo-300 text-slate-600 hover:bg-slate-50'
                        }`}
                      >
                        <i className={`ph-bold ${type.icon} text-2xl mb-2`}></i>
                        <span className="text-xs font-semibold text-center leading-tight">{type.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div>
                <label className="block text-sm font-semibold text-slate-700 mb-2">Your Question</label>
                <input 
                  type="text" 
                  value={newQuestion}
                  onChange={(e) => setNewQuestion(e.target.value)}
                  placeholder="What would you like to ask?"
                  className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-lg"
                />
              </div>

              {['multiple_choice', 'scales', 'ranking'].includes(newPollType) && (
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-2">
                    {newPollType === 'scales' ? 'Statements to rate' : 'Options'}
                  </label>
                  <div className="space-y-3">
                    {newOptions.map((opt, idx) => (
                      <div key={idx} className="flex gap-2">
                        <input 
                          type="text" 
                          value={opt}
                          onChange={(e) => {
                            const updated = [...newOptions];
                            updated[idx] = e.target.value;
                            setNewOptions(updated);
                          }}
                          placeholder={`Option ${idx + 1}`}
                          className="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 outline-none"
                        />
                        {newOptions.length > 2 && (
                          <button 
                            onClick={() => setNewOptions(newOptions.filter((_, i) => i !== idx))}
                            className="p-3 text-red-500 hover:bg-red-50 rounded-xl transition-colors"
                          >
                            <i className="ph-bold ph-trash text-xl"></i>
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                  <button 
                    onClick={() => setNewOptions([...newOptions, ''])}
                    className="mt-4 flex items-center gap-2 text-indigo-600 font-medium hover:text-indigo-800"
                  >
                    <i className="ph-bold ph-plus"></i> Add Option
                  </button>
                </div>
              )}

              <div className="flex items-center gap-3 mt-6 pt-6 border-t border-slate-100">
                <label className="flex items-center gap-3 cursor-pointer">
                  <input 
                    type="checkbox" 
                    checked={allowMultiple}
                    onChange={(e) => setAllowMultiple(e.target.checked)}
                    className="w-5 h-5 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer"
                  />
                  <span className="text-sm font-semibold text-slate-700">Allow participants to submit multiple responses</span>
                </label>
              </div>

              <div className="pt-6">
                <button 
                  onClick={handleCreatePoll}
                  className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-bold text-lg shadow-md transition-all flex items-center justify-center gap-2"
                >
                  <i className="ph-fill ph-play text-xl"></i>
                  Start Presentation
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      const renderHostView = () => {
        if (!activePoll) return <div className="p-10 text-center flex-1">Loading poll...</div>;

        const totalVotes = activePollVotes.length;
        const maxVotes = Math.max(...voteCounts, 1);

        const renderChartContent = () => {
          switch (activePoll.type) {
            case 'word_cloud': {
              const words = getWordCloudData();
              return (
                <div className="flex flex-wrap justify-center items-center gap-4 max-w-4xl p-8">
                  {words.length === 0 && <div className="text-slate-500 text-2xl italic">Waiting for responses...</div>}
                  {words.map(([word, count], idx) => {
                    const size = Math.min(1.5 + (count * 0.5), 6); 
                    const color = CHART_COLORS[idx % CHART_COLORS.length];
                    return (
                      <span key={idx} style={{ fontSize: `${size}rem`, color, fontWeight: 'bold', lineHeight: 1 }} className="transition-all duration-500">
                        {word}
                      </span>
                    );
                  })}
                </div>
              );
            }
            case 'open_ended':
              return (
                <div className="w-full max-w-5xl columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
                  {activePollVotes.length === 0 && <div className="text-slate-500 text-2xl italic w-full text-center">Waiting for responses...</div>}
                  {activePollVotes.map((vote, idx) => (
                    <div key={idx} className="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700 break-inside-avoid">
                      <p className="text-xl leading-relaxed text-slate-100">"{vote.text}"</p>
                    </div>
                  ))}
                </div>
              );
            case 'scales': {
              const scalesData = getScalesData();
              return (
                <div className="w-full max-w-4xl space-y-8">
                  {scalesData.map((item, idx) => (
                    <div key={idx} className="w-full">
                      <div className="flex justify-between items-end mb-2">
                        <span className="text-2xl font-semibold">{item.option}</span>
                        <span className="text-3xl font-bold text-indigo-400">{item.average}</span>
                      </div>
                      <div className="w-full h-8 bg-slate-800 rounded-full overflow-hidden">
                        <div 
                          className="h-full bg-indigo-500 transition-all duration-700 ease-out"
                          style={{ width: `${(item.average / 5) * 100}%` }}
                        />
                      </div>
                      <div className="flex justify-between text-slate-500 text-sm mt-2 px-1">
                        <span>Strongly Disagree (1)</span>
                        <span>Strongly Agree (5)</span>
                      </div>
                    </div>
                  ))}
                </div>
              );
            }
            case 'ranking': {
              const rankedData = getRankingData();
              return (
                <div className="w-full max-w-3xl space-y-4">
                  {rankedData.map((item, idx) => (
                    <div key={idx} className="flex items-center bg-slate-800 rounded-2xl p-6 transform transition-all duration-500" style={{ transform: `translateY(${idx * 4}px)` }}>
                      <div className="w-12 h-12 rounded-full bg-indigo-600 flex items-center justify-center font-bold text-2xl mr-6 shrink-0">
                        {idx + 1}
                      </div>
                      <div className="flex-1 text-2xl font-semibold">
                        {item.option}
                      </div>
                      <div className="text-slate-400 font-medium text-xl">
                        {item.points} pts
                      </div>
                    </div>
                  ))}
                </div>
              );
            }
            case 'multiple_choice':
            default:
              return (
                <div className="w-full flex items-end justify-center gap-4 md:gap-8 h-[400px]">
                  {activePoll.options?.map((option, idx) => {
                    const count = voteCounts[idx];
                    const percentage = totalVotes === 0 ? 0 : Math.round((count / totalVotes) * 100);
                    const heightPercent = (count / maxVotes) * 100;
                    const color = CHART_COLORS[idx % CHART_COLORS.length];

                    return (
                      <div key={idx} className="flex flex-col items-center justify-end h-full w-24 md:w-32 group">
                        <div className="text-2xl font-bold mb-2 opacity-0 group-hover:opacity-100 transition-opacity">
                          {count}
                        </div>
                        <div 
                          className="w-full rounded-t-lg relative transition-all duration-700 ease-bounce shadow-lg"
                          style={{ 
                            height: `${heightPercent}%`, 
                            minHeight: '4px',
                            backgroundColor: color 
                          }}
                        >
                           <div className="absolute -top-8 left-0 right-0 text-center font-bold text-lg hidden md:block text-slate-300">
                             {percentage > 0 ? `${percentage}%` : ''}
                           </div>
                        </div>
                        <div className="mt-4 text-center font-semibold text-lg md:text-xl break-words w-full px-2 leading-tight h-16 flex items-start justify-center">
                          {option}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
          }
        };

        return (
          <div className="flex-1 bg-slate-900 flex flex-col font-sans text-white h-screen">
            <div className="bg-slate-800/50 py-4 px-8 flex justify-between items-center border-b border-slate-700">
              <div className="text-xl">
                Go to <span className="font-bold text-white bg-slate-700 px-3 py-1 rounded-md tracking-wider mx-2">this URL</span> and use code <span className="font-bold text-indigo-400 text-3xl ml-2">{activePoll.code}</span>
              </div>
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2 text-slate-300">
                  <i className="ph-bold ph-users text-xl"></i>
                  <span className="font-semibold text-xl">{totalVotes}</span>
                </div>
                <button 
                  onClick={() => { window.location.hash = '#home'; }}
                  className="text-sm text-slate-400 hover:text-white underline"
                >
                  Exit
                </button>
              </div>
            </div>

            <div className="flex-1 flex flex-col items-center justify-center p-12 max-w-7xl mx-auto w-full">
              <h1 className="text-5xl md:text-6xl font-bold text-center mb-16 leading-tight">
                {activePoll.question}
              </h1>
              {renderChartContent()}
            </div>
          </div>
        );
      };

      const renderJoin = () => (
        <div className="flex-1 bg-indigo-600 flex flex-col items-center justify-center p-6 h-screen">
          <div className="w-full max-w-sm">
            <div className="flex justify-center mb-8">
              <i className="ph-bold ph-chart-bar text-white text-5xl"></i>
            </div>
            <form onSubmit={handleJoinPoll} className="bg-white rounded-2xl shadow-2xl p-8">
              <h2 className="text-2xl font-bold text-slate-800 text-center mb-6">Enter Join Code</h2>
              
              <input 
                type="text" 
                maxLength={4}
                value={joinCode}
                onChange={(e) => setJoinCode(e.target.value.replace(/\D/g, ''))}
                className="w-full text-center text-4xl font-bold tracking-widest px-4 py-4 rounded-xl border-2 border-slate-200 focus:border-indigo-600 focus:ring-0 outline-none mb-4"
                placeholder="1234"
              />
              
              {joinError && <p className="text-red-500 text-sm text-center mb-4">{joinError}</p>}

              <button 
                type="submit"
                disabled={joinCode.length < 4}
                className="w-full bg-indigo-600 disabled:bg-slate-300 text-white py-4 rounded-xl font-bold text-lg transition-colors"
              >
                Submit
              </button>

              <button 
                type="button"
                onClick={() => { window.location.hash = '#home'; }}
                className="w-full mt-4 text-slate-500 font-medium hover:text-slate-800"
              >
                Cancel
              </button>
            </form>
          </div>
        </div>
      );

      const renderParticipantView = () => {
        if (!activePoll) {
           return (
             <div className="flex-1 flex items-center justify-center p-6 text-center">
               <div>
                 <div className="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mx-auto mb-4"></div>
                 <p className="text-slate-500 font-medium">Waiting for host...</p>
               </div>
             </div>
           );
        }

        if (hasUserVoted && !wantsToVoteAgain) {
          return (
            <div className="flex-1 bg-indigo-50 flex flex-col items-center justify-center p-6 text-center h-screen">
              <i className="ph-fill ph-check-circle text-green-500 text-7xl mb-6"></i>
              <h2 className="text-3xl font-bold text-slate-800 mb-2">Submitted!</h2>
              <p className="text-slate-600 mb-8">Look at the presentation screen for live results.</p>
              
              {activePoll.allowMultipleResponses && (
                <button 
                  onClick={() => setWantsToVoteAgain(true)}
                  className="mb-8 bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-md hover:bg-indigo-700 transition"
                >
                  Submit Another Response
                </button>
              )}

              <button 
                onClick={() => { window.location.hash = '#home'; }}
                className="text-indigo-600 font-semibold hover:underline"
              >
                Leave Presentation
              </button>
            </div>
          );
        }

        const toggleRank = (idx) => {
          if (rankOrder.includes(idx)) {
            setRankOrder(rankOrder.filter(i => i !== idx));
          } else {
            setRankOrder([...rankOrder, idx]);
          }
        };

        const renderInputForm = () => {
          switch(activePoll.type) {
            case 'word_cloud':
              return (
                <div className="space-y-4">
                  <input 
                    type="text" 
                    value={textInput}
                    onChange={(e) => setTextInput(e.target.value)}
                    placeholder="Enter a word or short phrase..."
                    className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-indigo-600 outline-none text-lg"
                    maxLength={50}
                  />
                  <button 
                    onClick={() => handleVote({ text: textInput.trim() })}
                    disabled={!textInput.trim()}
                    className="w-full bg-indigo-600 disabled:bg-slate-300 text-white p-4 rounded-xl font-bold text-lg"
                  >
                    Submit Word
                  </button>
                </div>
              );
            case 'open_ended':
              return (
                <div className="space-y-4">
                  <textarea 
                    value={textInput}
                    onChange={(e) => setTextInput(e.target.value)}
                    placeholder="Type your response here..."
                    className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-indigo-600 outline-none text-lg h-32 resize-none"
                    maxLength={500}
                  />
                  <button 
                    onClick={() => handleVote({ text: textInput.trim() })}
                    disabled={!textInput.trim()}
                    className="w-full bg-indigo-600 disabled:bg-slate-300 text-white p-4 rounded-xl font-bold text-lg"
                  >
                    Submit Response
                  </button>
                </div>
              );
            case 'scales':
              return (
                <div className="space-y-8">
                  {activePoll.options.map((option, idx) => (
                    <div key={idx} className="bg-white p-5 rounded-xl border-2 border-slate-100 shadow-sm">
                      <label className="block font-semibold text-slate-700 mb-4 text-lg">{option}</label>
                      <input 
                        type="range" 
                        min="1" max="5" step="1"
                        value={scaleValues[idx] || 3}
                        onChange={(e) => setScaleValues({ ...scaleValues, [idx]: Number(e.target.value) })}
                        className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                      />
                      <div className="flex justify-between text-slate-400 text-sm mt-3 font-medium">
                        <span>1 (Strongly Disagree)</span>
                        <span className="text-indigo-600 font-bold text-lg">{scaleValues[idx] || 3}</span>
                        <span>5 (Strongly Agree)</span>
                      </div>
                    </div>
                  ))}
                  <button 
                    onClick={() => handleVote({ scaleValues: { ...Object.fromEntries(activePoll.options.map((_, i) => [i, scaleValues[i] || 3])) } })}
                    className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-lg"
                  >
                    Submit Ratings
                  </button>
                </div>
              );
            case 'ranking':
              return (
                <div className="space-y-6">
                  <p className="text-slate-500 text-sm font-medium">Tap the options in order of your preference</p>
                  <div className="space-y-3">
                    {activePoll.options.map((option, idx) => {
                      const rank = rankOrder.indexOf(idx);
                      const isSelected = rank !== -1;
                      return (
                        <button
                          key={idx}
                          onClick={() => toggleRank(idx)}
                          className={`w-full p-5 rounded-xl text-left text-lg font-semibold transition-all shadow-sm flex items-center gap-4 ${
                            isSelected 
                              ? 'bg-indigo-50 border-2 border-indigo-600 text-indigo-900' 
                              : 'bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-700'
                          }`}
                        >
                          <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0 ${
                            isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'
                          }`}>
                            {isSelected ? rank + 1 : '-'}
                          </div>
                          {option}
                        </button>
                      );
                    })}
                  </div>
                  <button 
                    onClick={() => handleVote({ rankOrder })}
                    disabled={rankOrder.length !== activePoll.options.length}
                    className="w-full bg-indigo-600 disabled:bg-slate-300 text-white p-4 rounded-xl font-bold text-lg"
                  >
                    {rankOrder.length === activePoll.options.length ? 'Submit Ranking' : `Rank all options (${rankOrder.length}/${activePoll.options.length})`}
                  </button>
                </div>
              );
            case 'multiple_choice':
            default:
              return (
                <div className="space-y-3">
                  {activePoll.options.map((option, idx) => (
                    <button
                      key={idx}
                      onClick={() => handleVote({ optionIndex: idx })}
                      className="w-full bg-white hover:bg-indigo-50 hover:border-indigo-300 border-2 border-slate-200 p-5 rounded-xl text-left text-lg font-semibold text-slate-700 transition-all shadow-sm flex items-center justify-between group"
                    >
                      {option}
                      <div className="w-6 h-6 rounded-full border-2 border-slate-300 group-hover:border-indigo-500 flex items-center justify-center">
                        <div className="w-3 h-3 rounded-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                      </div>
                    </button>
                  ))}
                </div>
              );
          }
        };

        return (
          <div className="flex-1 flex flex-col items-center p-6 h-screen">
            <div className="w-full max-w-md mt-8">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 text-center mb-6">
                <p className="text-sm font-bold text-indigo-600 tracking-wider uppercase mb-2">
                  {POLL_TYPES.find(t => t.id === activePoll.type)?.label || 'Question'}
                </p>
                <h2 className="text-2xl font-bold text-slate-800 leading-snug">
                  {activePoll.question}
                </h2>
              </div>
              {renderInputForm()}
            </div>
          </div>
        );
      };

      let currentView;
      switch (view) {
        case 'create': currentView = renderCreate(); break;
        case 'dashboard': currentView = renderDashboard(); break;
        case 'host': currentView = renderHostView(); break;
        case 'join': currentView = renderJoin(); break;
        case 'participant': currentView = renderParticipantView(); break;
        default: currentView = renderHome(); break;
      }

      return (
        <div className="min-h-screen flex flex-col font-sans">
          {user?.isMockUser && (
            <div className="bg-amber-500 text-white p-3 text-center text-sm font-semibold z-50">
              ⚠️ <strong>Setup Required:</strong> To enable login and save polls, go to Firebase Console &rarr; Authentication &rarr; Sign-in method, and enable <strong>Google Provider</strong> and <strong>Anonymous</strong>.
            </div>
          )}
          {currentView}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
